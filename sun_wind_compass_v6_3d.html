
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  #app{padding:14px 0;font-family:var(--font-sans)}
  #location-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
  #loc-input{flex:1;font-family:var(--font-mono);font-size:13px;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none}
  #loc-input:focus{border-color:var(--color-border-primary)}
  #loc-btn,#geo-btn{padding:8px 14px;font-size:13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer}
  #loc-btn:hover,#geo-btn:hover{background:var(--color-background-secondary)}
  #time-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  #time-slider{flex:1}
  #time-label{font-family:var(--font-mono);font-size:13px;min-width:48px;text-align:right;color:var(--color-text-secondary)}
  #animate-btn{padding:6px 12px;font-size:12px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;color:var(--color-text-primary);cursor:pointer;white-space:nowrap}
  #animate-btn:hover{background:var(--color-background-secondary)}
  canvas{width:100%;display:block}
  #info-row{display:flex;gap:10px;margin-top:12px}
  .ic{flex:1;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:9px 12px}
  .il{font-size:11px;color:var(--color-text-tertiary);letter-spacing:.05em;margin-bottom:3px}
  .iv{font-family:var(--font-mono);font-size:17px;font-weight:500}
  .sv{color:#E8943A}.bv{color:#5bb8ff}
  .is{font-size:11px;color:var(--color-text-secondary);margin-top:1px}
  #wind-status{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin-top:2px;min-height:14px}
  #status{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin-top:2px;min-height:14px}
</style>

<div id="app">
  <div id="location-bar">
    <input id="loc-input" type="text" placeholder="City or coordinates…">
    <button id="loc-btn">Go</button>
    <button id="geo-btn">⌖ Auto</button>
  </div>
  <div id="time-row">
    <span style="font-size:11px;color:var(--color-text-tertiary)">00:00</span>
    <input id="time-slider" type="range" min="0" max="1440" value="720" step="1">
    <span style="font-size:11px;color:var(--color-text-tertiary)">24:00</span>
    <span id="time-label">12:00</span>
    <button id="animate-btn">▶ Play</button>
  </div>
  <canvas id="c"></canvas>
  <div id="info-row">
    <div class="ic"><div class="il">Sun azimuth</div><div class="iv sv" id="sun-az">—</div><div class="is" id="sun-alt-lbl">altitude —</div></div>
    <div class="ic"><div class="il">Sun angle</div><div class="iv sv" id="sun-ang">—</div><div class="is" id="sun-phase">—</div></div>
    <div class="ic"><div class="il">Wind</div><div class="iv bv" id="wind-val">—</div><div class="is" id="wind-dir">loading…</div></div>
  </div>
  <div id="wind-status"></div>
  <div id="status"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/suncalc/1.9.0/suncalc.min.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('time-slider');
const timeLbl = document.getElementById('time-label');
const animBtn = document.getElementById('animate-btn');

let lat = 47.45, lng = 8.56;
let windDeg = null, windSpd = null;
let animating = false, playInterval = null;

function dpr(){ return Math.min(window.devicePixelRatio||1,2); }

function resize(){
  const w = canvas.parentElement.clientWidth;
  const h = Math.round(w * 0.95);
  canvas.width = w*dpr(); canvas.height = h*dpr();
  canvas.style.height = h+'px';
  ctx.scale(dpr(),dpr());
  draw();
}

function getDate(){ const m=+slider.value,d=new Date(); d.setHours(Math.floor(m/60),m%60,0,0); return d; }
function fmtTime(m){ return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }
function azCard(deg){ return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16]; }
function sunPhase(date){
  const t=SunCalc.getTimes(date,lat,lng),n=date.getTime();
  if(n<t.dawn.getTime()) return 'Night';
  if(n<t.sunrise.getTime()) return 'Dawn';
  if(n<t.solarNoon.getTime()) return 'Morning';
  if(n<t.goldenHour.getTime()) return 'Afternoon';
  if(n<t.sunset.getTime()) return 'Golden hour';
  if(n<t.dusk.getTime()) return 'Dusk';
  return 'Night';
}
function lerpHex(a,b,t){
  const p=s=>parseInt(s,16),ah=a.slice(1),bh=b.slice(1);
  return '#'+[[0,2],[2,4],[4,6]].map(([s,e])=>Math.round(p(ah.slice(s,e))*(1-t)+p(bh.slice(s,e))*t).toString(16).padStart(2,'0')).join('');
}

// ── Camera / projection ─────────────────────────────────────────────────────
// World coords: x=East, y=North, z=Up  (right-handed)
// Camera looks down from a fixed elevation angle (35°) and slightly offset azimuth (210°)
// so we always see top + two side faces of the cube.
// We use an oblique parallel projection:
//   screen_x = cx + world_x * cos(camAz) - world_y * sin(camAz)
//   screen_y = cy - world_z * sinElev  + (world_x * sin(camAz) + world_y * cos(camAz)) * cosElev * yScale
// where yScale compresses the ground plane into the ellipse.

const CAM_AZ_DEG  = 210;   // camera looks from SW → NE  (good for showing N+E faces)
const CAM_EL_DEG  = 32;    // elevation of camera above ground

function project(wx, wy, wz, cx, cy, eRx, eRy){
  const camAz  = CAM_AZ_DEG * Math.PI/180;
  const camEl  = CAM_EL_DEG * Math.PI/180;
  const sinA = Math.sin(camAz), cosA = Math.cos(camAz);
  const sinE = Math.sin(camEl), cosE = Math.cos(camEl);

  // Rotate world around Z by camera azimuth so camera faces -Y′ axis
  const rx =  wx*cosA + wy*sinA;
  const ry = -wx*sinA + wy*cosA;
  const rz =  wz;

  // Project: x stays, y & z combine for screen y
  const sx = cx + rx * (eRx/eRx * eRx * 0.8);   // straight across
  const sy = cy - rz * sinE * (eRx*0.8) - ry * cosE * (eRy*0.8);

  return { x: sx, y: sy };
}

// Sun direction in world coords (for shadow + shading)
function sunWorldDir(azDeg, altDeg){
  const az  = azDeg * Math.PI/180;
  const alt = Math.max(0.001, altDeg) * Math.PI/180;
  return {
    x:  Math.sin(az)*Math.cos(alt),
    y: -Math.cos(az)*Math.cos(alt),
    z:  Math.sin(alt)
  };
}

// Project a ground-plane point using the same camera (wz=0)
function projectGround(wx, wy, cx, cy, eRx, eRy){
  return project(wx, wy, 0, cx, cy, eRx, eRy);
}

// Compass ring: a point at compass bearing az, distance r on ground plane
function compassPt(azDeg, r, cx, cy, eRx, eRy){
  const rad = azDeg * Math.PI/180;
  const wx = Math.sin(rad)*r, wy = -Math.cos(rad)*r;
  return projectGround(wx, wy, cx, cy, eRx, eRy);
}

// Shadow of 3D point onto ground (z=0)
function shadowOf(wx,wy,wz, sun){
  if(sun.z<=0.001) return null;
  const k=wz/sun.z;
  return { x: wx-k*sun.x, y: wy-k*sun.y };
}

// Convex hull
function convexHull(pts){
  if(pts.length<3) return pts;
  const s=[...pts].sort((a,b)=>a.x-b.x||a.y-b.y);
  const cross=(o,a,b)=>(a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);
  const lower=[]; for(const p of s){while(lower.length>=2&&cross(lower[lower.length-2],lower[lower.length-1],p)<=0)lower.pop();lower.push(p);}
  const upper=[]; for(let i=s.length-1;i>=0;i--){const p=s[i];while(upper.length>=2&&cross(upper[upper.length-2],upper[upper.length-1],p)<=0)upper.pop();upper.push(p);}
  upper.pop(); lower.pop(); return lower.concat(upper);
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function draw(){
  const cw=canvas.width/dpr(), ch=canvas.height/dpr();
  ctx.clearRect(0,0,cw,ch);

  const date=getDate();
  const sp=SunCalc.getPosition(date,lat,lng);
  const sunAz  = sp.azimuth*180/Math.PI+180;
  const sunAlt = sp.altitude*180/Math.PI;
  const sun    = sunWorldDir(sunAz, sunAlt);

  // Layout: compass centered slightly below middle, leaving sky above
  const cx=cw/2, cy=ch*0.60;
  const eRx=Math.min(cw,ch)*0.40;
  const eRy=eRx; // we handle compression inside project()

  // ── Sky background ──
  let skyTop,skyMid;
  if(sunAlt<-12){skyTop='#07091a';skyMid='#10142a';}
  else if(sunAlt<0){const t=(sunAlt+12)/12;skyTop=lerpHex('#07091a','#1b2a50',t);skyMid=lerpHex('#10142a','#2a1810',t);}
  else if(sunAlt<20){const t=sunAlt/20;skyTop=lerpHex('#1b2a50','#1e4a80',t);skyMid=lerpHex('#2a1810','#d06828',t);}
  else{skyTop='#1a3c70';skyMid='#4888b8';}
  const bgGrad=ctx.createLinearGradient(0,0,0,ch);
  bgGrad.addColorStop(0,skyTop);bgGrad.addColorStop(0.6,skyMid);bgGrad.addColorStop(1,'#1a2e14');
  ctx.fillStyle=bgGrad; ctx.fillRect(0,0,cw,ch);

  // ── Ground disc — projected ellipse ──
  // Build the ellipse as a polygon of projected ground-ring points
  const RING_R = eRx;
  ctx.beginPath();
  for(let i=0;i<=360;i+=5){
    const p=compassPt(i,RING_R,cx,cy,eRx,eRy);
    i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);
  }
  ctx.closePath();
  const gGrad=ctx.createLinearGradient(cx,cy-eRy*0.45,cx,cy+eRy*0.45);
  gGrad.addColorStop(0,'#3d6433'); gGrad.addColorStop(1,'#1e3818');
  ctx.fillStyle=gGrad; ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.13)'; ctx.lineWidth=0.8; ctx.stroke();

  // inner ring
  ctx.beginPath();
  for(let i=0;i<=360;i+=5){const p=compassPt(i,RING_R*0.6,cx,cy,eRx,eRy);i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y);}
  ctx.closePath(); ctx.strokeStyle='rgba(255,255,255,0.06)'; ctx.lineWidth=0.4; ctx.stroke();

  // ticks
  for(let i=0;i<360;i+=10){
    const o=compassPt(i,RING_R*0.99,cx,cy,eRx,eRy);
    const inn=compassPt(i,RING_R*(i%30===0?0.85:0.93),cx,cy,eRx,eRy);
    ctx.strokeStyle=i%30===0?'rgba(255,255,255,0.28)':'rgba(255,255,255,0.11)';
    ctx.lineWidth=i%30===0?0.8:0.4;
    ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(inn.x,inn.y);ctx.stroke();
  }

  // crosshairs
  ctx.setLineDash([3,6]);ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=0.5;
  ['N','S','E','W'].forEach((d,i)=>{
    const a=[0,180,90,270][i];
    const p1=compassPt(a,RING_R,cx,cy,eRx,eRy);
    const p2=compassPt((a+180)%360,RING_R,cx,cy,eRx,eRy);
    if(i<2){ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke();}
  });
  ctx.setLineDash([]);

  // cardinals
  [{a:0,l:'N',c:'#e84040'},{a:90,l:'E',c:'rgba(255,255,255,0.65)'},{a:180,l:'S',c:'rgba(255,255,255,0.65)'},{a:270,l:'W',c:'rgba(255,255,255,0.65)'}].forEach(c=>{
    const p=compassPt(c.a,RING_R*1.1,cx,cy,eRx,eRy);
    ctx.font='bold 12px var(--font-sans,sans-serif)';ctx.fillStyle=c.c;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.l,p.x,p.y);
  });
  [{a:45,l:'NE'},{a:135,l:'SE'},{a:225,l:'SW'},{a:315,l:'NW'}].forEach(c=>{
    const p=compassPt(c.a,RING_R*1.09,cx,cy,eRx,eRy);
    ctx.font='9px var(--font-sans,sans-serif)';ctx.fillStyle='rgba(255,255,255,0.28)';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(c.l,p.x,p.y);
  });

  // center dot
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();

  // ── Wind arrow ──
  if(windDeg!==null){
    const wToDeg=(windDeg+180)%360;
    const tail=compassPt(windDeg,RING_R*0.38,cx,cy,eRx,eRy);
    const tip =compassPt(wToDeg, RING_R*0.38,cx,cy,eRx,eRy);
    const ang =Math.atan2(tip.y-tail.y,tip.x-tail.x);
    ctx.strokeStyle='#5bb8ff';ctx.lineWidth=5;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(tail.x,tail.y);ctx.lineTo(tip.x,tip.y);ctx.stroke();
    ctx.fillStyle='#5bb8ff';
    ctx.beginPath();ctx.moveTo(tip.x,tip.y);ctx.lineTo(tip.x-16*Math.cos(ang-0.42),tip.y-16*Math.sin(ang-0.42));ctx.lineTo(tip.x-16*Math.cos(ang+0.42),tip.y-16*Math.sin(ang+0.42));ctx.closePath();ctx.fill();
    for(let b=0;b<3;b++){const bd=10+b*9,bx=tail.x+Math.cos(ang)*bd,by=tail.y+Math.sin(ang)*bd,ba=ang+Math.PI;ctx.strokeStyle='#5bb8ff';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx+Math.cos(ba-0.7)*12,by+Math.sin(ba-0.7)*12);ctx.stroke();}
    if(windSpd!==null){
      const lp=compassPt(wToDeg,RING_R*0.55,cx,cy,eRx,eRy);
      const label=Math.round(windSpd)+' km/h '+azCard(windDeg);
      ctx.font='bold 11px var(--font-mono,monospace)';
      const tw=ctx.measureText(label).width;
      ctx.fillStyle='rgba(10,20,40,0.72)';roundRect(lp.x-tw/2-8,lp.y-13,tw+16,21,5);ctx.fill();
      ctx.fillStyle='#5bb8ff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(label,lp.x,lp.y-3);
    }
    const fp=compassPt(windDeg,RING_R*0.6,cx,cy,eRx,eRy);
    ctx.font='10px var(--font-sans,sans-serif)';ctx.fillStyle='rgba(150,200,255,0.7)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('from '+azCard(windDeg),fp.x,fp.y+12);
  }

  // ─────────────────────────────────────────────────────────────────────────
  // CUBE
  // Cube half-size in world units (eRx = compass radius in world)
  const S = RING_R * 0.11;

  // 8 vertices: bottom 0-3, top 4-7  (x=E, y=N, z=Up)
  const V = [
    {x:-S,y:-S,z:0},{x:S,y:-S,z:0},{x:S,y:S,z:0},{x:-S,y:S,z:0},
    {x:-S,y:-S,z:S*2},{x:S,y:-S,z:S*2},{x:S,y:S,z:S*2},{x:-S,y:S,z:S*2}
  ];

  // Project all 8 verts with full 3D camera
  const P = V.map(v=>project(v.x,v.y,v.z,cx,cy,eRx,eRy));

  // ── Shadow ──
  if(sunAlt>0.5){
    const spts=[];
    V.forEach(v=>{
      const s=shadowOf(v.x,v.y,v.z,sun);
      if(s){const sp=projectGround(s.x,s.y,cx,cy,eRx,eRy);spts.push(sp);}
    });
    // also add bottom verts projected on ground
    for(let i=0;i<4;i++){const sp=projectGround(V[i].x,V[i].y,cx,cy,eRx,eRy);spts.push(sp);}
    const hull=convexHull(spts);
    if(hull.length>2){
      ctx.beginPath();ctx.moveTo(hull[0].x,hull[0].y);hull.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();
      ctx.fillStyle='rgba(0,0,0,0.42)';ctx.fill();
    }
  }

  // ── Cube faces ──
  // Define faces: each has vertex indices and outward world normal
  const faces=[
    {idx:[4,5,6,7], nx:0,  ny:0,  nz:1},   // top
    {idx:[0,1,5,4], nx:0,  ny:-1, nz:0},   // North face
    {idx:[1,2,6,5], nx:1,  ny:0,  nz:0},   // East face
    {idx:[2,3,7,6], nx:0,  ny:1,  nz:0},   // South face
    {idx:[3,0,4,7], nx:-1, ny:0,  nz:0},   // West face
    {idx:[0,3,2,1], nx:0,  ny:0,  nz:-1},  // bottom (skip)
  ];

  // Camera direction (what the viewer looks along, in world space)
  const camAz=CAM_AZ_DEG*Math.PI/180, camEl=CAM_EL_DEG*Math.PI/180;
  const camDir={ x:-Math.sin(camAz)*Math.cos(camEl), y:Math.cos(camAz)*Math.cos(camEl), z:-Math.sin(camEl) };

  // Sort faces back-to-front (painter's algorithm) by average projected y
  const visibleFaces=faces.filter(f=>{
    // back-face cull: dot(normal, -camDir)
    const dot=f.nx*(-camDir.x)+f.ny*(-camDir.y)+f.nz*(-camDir.z);
    return dot>0;
  });
  visibleFaces.sort((a,b)=>{
    const ay=a.idx.reduce((s,i)=>s+P[i].y,0)/a.idx.length;
    const by2=b.idx.reduce((s,i)=>s+P[i].y,0)/b.idx.length;
    return by2-ay; // furthest (highest screen y in our projection) drawn first
  });

  visibleFaces.forEach(f=>{
    if(f.nz===-1) return; // skip bottom
    const pts=f.idx.map(i=>P[i]);

    // Diffuse lighting
    const diffuse=Math.max(0, f.nx*sun.x + f.ny*(-sun.y) + f.nz*sun.z);
    const ambient=0.25;
    const bright=ambient+diffuse*(1-ambient);

    // Base colors per face
    let r,g,b;
    if(f.nz===1){r=210;g=225;b=240;}       // top — lightest
    else if(f.ny===-1){r=170;g=185;b=200;} // North
    else if(f.nx===1){r=145;g=165;b=182;}  // East
    else if(f.ny===1){r=130;g=150;b=168;}  // South (darker, away from cam)
    else{r=120;g=140;b=158;}               // West

    r=Math.min(255,Math.round(r*bright));
    g=Math.min(255,Math.round(g*bright));
    b=Math.min(255,Math.round(b*bright));

    ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);pts.forEach(p=>ctx.lineTo(p.x,p.y));ctx.closePath();
    ctx.fillStyle=`rgb(${r},${g},${b})`;ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=0.7;ctx.stroke();
  });

  // ─────────────────────────────────────────────────────────────────────────
  // SUN in sky — azimuth maps to x on a sky arc, altitude lifts upward
  const sunAzRad=sunAz*Math.PI/180;
  // Map sun screen position: azimuth → horizontal spread, altitude → vertical
  const skyR = cw*0.38;
  const sunScreenX = cx + Math.sin(sunAzRad)*skyR*0.7;
  const skyTop2 = cy*0.08;
  const altFrac = Math.max(0,Math.min(1,sunAlt/90));
  const sunScreenY = cy - altFrac*(cy-skyTop2)*0.9;
  const sunVis=Math.max(0,Math.min(1,(sunAlt+5)/10));

  // Day arc
  ctx.strokeStyle='rgba(232,148,58,0.18)';ctx.lineWidth=0.8;ctx.setLineDash([4,7]);
  ctx.beginPath();let arcStarted=false;
  for(let m=0;m<=1440;m+=8){
    const d2=new Date(date);d2.setHours(Math.floor(m/60),m%60,0,0);
    const p2=SunCalc.getPosition(d2,lat,lng);
    const az2=p2.azimuth*180/Math.PI+180,alt2=p2.altitude*180/Math.PI;
    if(alt2<-3){arcStarted=false;continue;}
    const aRad2=az2*Math.PI/180;
    const sx2=cx+Math.sin(aRad2)*skyR*0.7;
    const af2=Math.max(0,Math.min(1,alt2/90));
    const sy2=cy-af2*(cy-skyTop2)*0.9;
    if(!arcStarted){ctx.moveTo(sx2,sy2);arcStarted=true;}else ctx.lineTo(sx2,sy2);
  }
  ctx.stroke();ctx.setLineDash([]);

  if(sunAlt>-3&&sunVis>0){
    const alpha=Math.max(0.2,sunVis*0.75);
    // Drop line from sun to compass center level
    ctx.strokeStyle=`rgba(232,148,58,${alpha*0.45})`;ctx.lineWidth=0.8;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(sunScreenX,sunScreenY);ctx.lineTo(sunScreenX,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sunScreenX,cy);ctx.lineTo(cx,cy);ctx.stroke();
    ctx.setLineDash([]);
    const sqS=7,dirSign=Math.sign(cx-sunScreenX)||1;
    ctx.strokeStyle=`rgba(232,148,58,${alpha*0.55})`;ctx.lineWidth=0.7;
    ctx.beginPath();ctx.moveTo(sunScreenX+sqS*dirSign,cy);ctx.lineTo(sunScreenX+sqS*dirSign,cy-sqS);ctx.lineTo(sunScreenX,cy-sqS);ctx.stroke();
    ctx.strokeStyle=`rgba(232,148,58,${alpha*0.4})`;ctx.lineWidth=1;ctx.setLineDash([4,6]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(sunScreenX,sunScreenY);ctx.stroke();
    ctx.setLineDash([]);
    const arcR=20,hAngle=Math.atan2(0,cx-sunScreenX),elevRad=sunAlt*Math.PI/180;
    ctx.strokeStyle=`rgba(255,200,80,${alpha*0.85})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(sunScreenX,cy,arcR,hAngle,hAngle-elevRad,true);ctx.stroke();
    ctx.font='bold 10px var(--font-mono,monospace)';ctx.fillStyle=`rgba(255,210,80,${Math.min(1,sunVis*1.5)})`;
    ctx.textAlign=cx<sunScreenX?'right':'left';ctx.textBaseline='middle';
    ctx.fillText(Math.round(sunAlt)+'°',sunScreenX+(cx<sunScreenX?-arcR-4:arcR+4),cy-arcR*0.5);
    const sunR=9,rayInner=sunR+4,rayOuter=sunR+12;
    ctx.strokeStyle=`rgba(255,220,80,${Math.min(1,sunVis)*0.65})`;ctx.lineWidth=1;
    for(let r=0;r<8;r++){const ra=r*Math.PI/4;ctx.beginPath();ctx.moveTo(sunScreenX+Math.cos(ra)*rayInner,sunScreenY+Math.sin(ra)*rayInner);ctx.lineTo(sunScreenX+Math.cos(ra)*rayOuter,sunScreenY+Math.sin(ra)*rayOuter);ctx.stroke();}
    ctx.fillStyle=sunAlt<8?'#f08030':(sunAlt<25?'#f5b040':'#ffe060');
    ctx.beginPath();ctx.arc(sunScreenX,sunScreenY,sunR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.arc(sunScreenX,sunScreenY,sunR,0,Math.PI*2);ctx.stroke();
  } else if(sunAlt<=-3){
    ctx.fillStyle='rgba(200,210,255,0.22)';ctx.beginPath();ctx.arc(cx,ch*0.12,6,0,Math.PI*2);ctx.fill();
  }

  // Azimuth dot on compass rim
  if(sunAlt>-5){
    const edgePt=compassPt(sunAz,RING_R,cx,cy,eRx,eRy);
    ctx.fillStyle='rgba(232,148,58,0.75)';ctx.beginPath();ctx.arc(edgePt.x,edgePt.y,4,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(232,148,58,0.28)';ctx.lineWidth=0.8;ctx.setLineDash([3,5]);
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(edgePt.x,edgePt.y);ctx.stroke();ctx.setLineDash([]);
    ctx.font='bold 10px var(--font-mono,monospace)';ctx.fillStyle='rgba(232,148,58,0.85)';
    ctx.textAlign=edgePt.x>cx?'left':'right';ctx.textBaseline='middle';
    ctx.fillText(Math.round(sunAz)+'°',edgePt.x+(edgePt.x>cx?6:-6),edgePt.y+(edgePt.y>cy?8:-8));
  }

  // Info cards
  timeLbl.textContent=fmtTime(+slider.value);
  document.getElementById('sun-az').textContent=Math.round(sunAz)+'°';
  document.getElementById('sun-alt-lbl').textContent='altitude '+Math.round(sunAlt)+'°';
  document.getElementById('sun-ang').textContent=Math.round(Math.max(0,sunAlt))+'°';
  document.getElementById('sun-phase').textContent=sunPhase(date);
  if(windDeg!==null){
    document.getElementById('wind-val').textContent=Math.round(windSpd||0)+' km/h';
    document.getElementById('wind-dir').textContent='from '+azCard(windDeg)+' ('+Math.round(windDeg)+'°)';
  }
}

const CAM_AZ_DEG=210, CAM_EL_DEG=32;

async function fetchWeather(){
  document.getElementById('wind-dir').textContent='fetching…';
  document.getElementById('wind-status').textContent='fetching wind…';
  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=kmh`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    windDeg=d.current.wind_direction_10m;windSpd=d.current.wind_speed_10m;
    document.getElementById('wind-status').textContent='wind updated '+new Date().toLocaleTimeString();
    document.getElementById('wind-dir').textContent='from '+azCard(windDeg)+' ('+Math.round(windDeg)+'°)';
    document.getElementById('wind-val').textContent=Math.round(windSpd)+' km/h';
    draw();
  }catch(e){document.getElementById('wind-dir').textContent='unavailable';document.getElementById('wind-status').textContent='wind fetch failed: '+e.message;}
}

async function geocode(q){
  document.getElementById('status').textContent='searching…';
  try{
    const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`);
    const d=await r.json();
    if(!d.length){document.getElementById('status').textContent='not found';return;}
    lat=+d[0].lat;lng=+d[0].lon;
    document.getElementById('status').textContent=d[0].display_name.split(',').slice(0,2).join(', ');
    document.getElementById('loc-input').value='';windDeg=null;windSpd=null;
    draw();fetchWeather();
  }catch(e){document.getElementById('status').textContent='error';}
}

animBtn.addEventListener('click',()=>{
  animating=!animating;animBtn.textContent=animating?'⏸ Pause':'▶ Play';
  if(animating){playInterval=setInterval(()=>{let v=+slider.value+4;if(v>1440)v=0;slider.value=v;draw();},50);}
  else clearInterval(playInterval);
});
slider.addEventListener('input',draw);
document.getElementById('loc-btn').addEventListener('click',()=>{const q=document.getElementById('loc-input').value.trim();if(q)geocode(q);});
document.getElementById('loc-input').addEventListener('keydown',e=>{if(e.key==='Enter'){const q=e.target.value.trim();if(q)geocode(q);}});
document.getElementById('geo-btn').addEventListener('click',()=>{
  document.getElementById('status').textContent='locating…';
  if(!navigator.geolocation){document.getElementById('status').textContent='not supported';return;}
  navigator.geolocation.getCurrentPosition(p=>{lat=p.coords.latitude;lng=p.coords.longitude;document.getElementById('status').textContent=lat.toFixed(3)+', '+lng.toFixed(3);windDeg=null;windSpd=null;draw();fetchWeather();},()=>document.getElementById('status').textContent='permission denied');
});
window.addEventListener('resize',resize);
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change',()=>draw());
resize();
const now=new Date();slider.value=now.getHours()*60+now.getMinutes();
fetchWeather();draw();
</script>
